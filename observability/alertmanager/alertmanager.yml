global:
  resolve_timeout: 5m

route:
  receiver: discord
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

  routes:
    - matchers:
        - severity = critical
      receiver: discord
      repeat_interval: 30m

    - matchers:
        - severity = warning
      receiver: discord
      repeat_interval: 2h

receivers:
  - name: discord
    discord_configs:
      - webhook_url: "https://discord.com/api/webhooks/1490214209085247488/NaiS0qFUfJ1zjsjyTI-g_0bXHH4KqcIekzSVFIJ92XBAuDaAYNbe8WgvG_d6-LkoM9AO"
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }} - {{ .CommonLabels.severity | toUpper }}{{ end }}] {{ .CommonAnnotations.summary }}'
        message: '{{ range .Alerts }}**{{ .Labels.alertname }}** | {{ .Annotations.description }}{{ end }}'

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname]
